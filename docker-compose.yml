services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  pke-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PKE_QDRANT_URL=http://qdrant:6333
      - PKE_OLLAMA_URL=http://ollama:11434
      - PKE_OBSIDIAN_VAULT_PATH=/vault
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-~/Documents/Journal}:/vault:ro
      - pke_data:/app/data
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_data:
  pke_data:
