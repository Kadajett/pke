apiVersion: batch/v1
kind: CronJob
metadata:
  name: pke-ingest-babybuddy
  namespace: pke
spec:
  schedule: "0 * * * *"  # Every hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pke-ingest
              image: localhost:5000/pke:latest
              command: ["python", "-m", "pke.cli.main", "ingest", "babybuddy"]
              envFrom:
                - configMapRef:
                    name: pke-config
                - secretRef:
                    name: pke-secrets
              volumeMounts:
                - name: data
                  mountPath: /app/data
              resources:
                requests:
                  memory: 128Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: pke-data
